<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro Sesderma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section class="screen screen-home is-active" data-screen="home" aria-labelledby="home-title">
        <h1 id="home-title" class="sr-only">Regístrate y vive la experiencia Sesderma</h1>
        <button class="primary-button home-button" type="button" data-go="form">
          Comenzar registro
        </button>
      </section>

      <section class="screen screen-form" data-screen="form" aria-labelledby="form-title">
        <h2 id="form-title" class="sr-only">Completa tu registro</h2>
        <form class="registration-form" id="registrationForm" novalidate>
          <div class="field field-name">
            <label for="fullName">Nombre</label>
            <input id="fullName" name="fullName" type="text" autocomplete="name" placeholder="Nombre" required />
          </div>

          <div class="field field-email">
            <label for="email">Correo electrónico</label>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="Correo electrónico" required />
          </div>

          <div class="field field-company">
            <label for="company">Empresa</label>
            <input id="company" name="company" type="text" autocomplete="organization" placeholder="Empresa" />
          </div>

          <div class="field field-position">
            <label for="position">Puesto</label>
            <input id="position" name="position" type="text" autocomplete="organization-title" placeholder="Puesto" />
          </div>

          <p class="form-error" id="formError" role="alert"></p>

          <button class="primary-button form-button" type="submit">Continuar</button>
        </form>
      </section>

      <section class="screen screen-thanks" data-screen="thanks" aria-labelledby="thanks-title">
        <h2 id="thanks-title" class="sr-only">Gracias por registrarte</h2>
        <button class="primary-button thanks-button" type="button" data-go="instructions">
          Continuar a instrucciones
        </button>
      </section>

      <section class="screen screen-instructions" data-screen="instructions" aria-labelledby="instructions-title">
        <h2 id="instructions-title" class="sr-only">Instrucciones del juego</h2>
        <button class="restart-button" type="button" data-go="home" aria-label="Volver al inicio">
          Reiniciar registro
        </button>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
